name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint with ruff
      run: |
        ruff check gerdsenai_cli/
        ruff format --check gerdsenai_cli/

    # The agentic-loop core is held at zero mypy errors and gated as BLOCKING so
    # new work on the heart of the tool can't silently regress types. Keep this
    # file list in sync with the clean core (see docs/ROADMAP.md). The rest of
    # the repo's backlog is paid down separately (non-blocking step below).
    - name: Type check core loop with mypy (blocking)
      run: |
        mypy \
          gerdsenai_cli/core/agent.py \
          gerdsenai_cli/core/tool_registry.py \
          gerdsenai_cli/core/tool_parsing.py \
          gerdsenai_cli/core/agent_tools.py \
          gerdsenai_cli/core/llm_client.py \
          gerdsenai_cli/core/mcp_client.py \
          gerdsenai_cli/core/mcp_tools.py \
          gerdsenai_cli/utils/performance.py

    # mypy has a backlog of pre-existing type errors (see docs/ROADMAP.md).
    # Kept visible but non-blocking so the rest of CI stays meaningful while
    # the backlog is worked down.
    - name: Type check with mypy (non-blocking)
      continue-on-error: true
      run: |
        mypy gerdsenai_cli/

    - name: Test with pytest
      run: |
        pytest

    - name: Build package
      run: |
        pip install build
        python -m build

    - name: Verify package
      run: |
        pip install twine
        twine check dist/*
